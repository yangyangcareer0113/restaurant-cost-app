<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>進貨品項管理 — 烽味營運管理系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="main-content">
    <div class="top-header">
      <button class="btn btn-sm btn-outline-secondary d-md-none me-2" onclick="toggleSidebar()">☰</button>
      <h6 class="mb-0 fw-bold">📦 進貨品項管理</h6>
      <div class="ms-auto d-flex gap-2">
        <select id="store-filter" class="form-select form-select-sm d-none" style="width:auto;" onchange="loadItems()">
          <option value="">所有門店</option>
        </select>
        <button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#itemModal" onclick="openAddModal()">
          + 新增品項
        </button>
      </div>
    </div>

    <div class="page-body">
      <div class="table-card">
        <div class="p-2 px-3 border-bottom d-flex gap-2">
          <input type="text" id="search" class="form-control form-control-sm" placeholder="搜尋品項名稱、廠商或類別..." oninput="filterItems()">
          <select id="sup-filter" class="form-select form-select-sm" style="width:auto;" onchange="filterItems()">
            <option value="">所有廠商</option>
          </select>
        </div>
        <div class="table-responsive">
          <table class="table table-hover mb-0 table-responsive-card">
            <thead>
              <tr>
                <th>品項名稱</th>
                <th>類別</th>
                <th>廠商</th>
                <th>單位</th>
                <th>標準單位成本</th>
                <th>規格說明</th>
                <th>安全庫存</th>
                <th>ABC</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="items-table">
              <tr><td colspan="8" class="text-center text-muted py-4">載入中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- 新增/編輯 Modal -->
  <div class="modal fade" id="itemModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modal-title">新增進貨品項</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="item-id">
          <div class="mb-3">
            <label class="form-label fw-semibold">品項名稱 <span class="text-danger">*</span></label>
            <input type="text" id="item-name" class="form-control" placeholder="例：雞骨架、燕餃、椰子水" required>
          </div>
          <div class="row g-2 mb-3">
            <div class="col-6">
              <label class="form-label fw-semibold">類別</label>
              <input type="text" id="item-category" class="form-control" placeholder="例：肉類、海鮮、蔬菜、飲品">
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold">廠商</label>
              <input type="text" id="item-supplier" class="form-control" placeholder="例：某肉品行、某食材商">
            </div>
          </div>
          <div class="row g-2 mb-3">
            <div class="col-6">
              <label class="form-label fw-semibold">進貨單位 <span class="text-danger">*</span></label>
              <input type="text" id="item-unit" class="form-control" placeholder="例：kg、包、箱、瓶、顆">
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold">標準單位成本（元）</label>
              <input type="number" id="item-unit-cost" class="form-control" min="0" step="0.01" value="0" placeholder="每單位進貨成本">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">規格說明</label>
            <input type="text" id="item-spec" class="form-control" placeholder="例：每包2kg、每箱24瓶、每包1023元">
          </div>
          <!-- BOM 換算（用於三層BOM成本計算） -->
          <div class="border rounded p-3 mb-3 bg-light">
            <div class="fw-semibold mb-2" style="font-size:0.85rem;">⚖️ BOM 單位換算（用於配方成本計算）</div>
            <div class="row g-2">
              <div class="col-6">
                <label class="form-label" style="font-size:0.82rem;">BOM 計量單位</label>
                <select id="item-bom-unit" class="form-select form-select-sm">
                  <option value="g">g（克）</option>
                  <option value="ml">ml（毫升）</option>
                  <option value="顆">顆</option>
                  <option value="份">份</option>
                  <option value="包">包</option>
                  <option value="盒">盒</option>
                  <option value="條">條</option>
                  <option value="根">根</option>
                  <option value="片">片</option>
                  <option value="個">個</option>
                </select>
                <div class="form-text">在配方裡用哪個單位量這項原料</div>
              </div>
              <div class="col-6">
                <label class="form-label" style="font-size:0.82rem;">換算數量</label>
                <input type="number" id="item-bom-conversion" class="form-control form-control-sm" min="0.001" step="0.001" value="1" oninput="updateBomHint()">
                <div class="form-text" id="bom-hint" style="color:#2563eb;"></div>
              </div>
            </div>
            <hr class="my-2">
            <div class="row g-2">
              <div class="col-6">
                <label class="form-label" style="font-size:0.82rem;">每份用量（選填）</label>
                <input type="number" id="item-serving-qty" class="form-control form-control-sm" min="0" step="0.01" placeholder="例：140" oninput="updateBomHint()">
                <div class="form-text">出餐一份實際用多少 BOM 計量單位</div>
              </div>
              <div class="col-6">
                <label class="form-label" style="font-size:0.82rem;">每份成本</label>
                <div class="form-control form-control-sm bg-white" id="serving-cost-preview" style="color:#166534;font-weight:600;">—</div>
                <div class="form-text">填了以後，配方裡用到這個品項就是用「幾份」計價</div>
              </div>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">安全庫存量（最低備量）</label>
            <input type="number" id="item-minstk" class="form-control" min="0" step="0.01" value="0">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">ABC 盤點分級</label>
            <div class="d-flex gap-3 mt-1">
              <div class="form-check">
                <input class="form-check-input" type="radio" name="abc-class" id="abc-A" value="A">
                <label class="form-check-label fw-bold text-danger" for="abc-A">A 級｜必盤</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="abc-class" id="abc-B" value="B" checked>
                <label class="form-check-label fw-bold text-warning" for="abc-B">B 級｜建議盤</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="abc-class" id="abc-C" value="C">
                <label class="form-check-label text-secondary" for="abc-C">C 級｜選填</label>
              </div>
            </div>
            <div class="form-text">A＝高成本/高頻叫貨，每月強制盤點；B＝中等重要，每季盤點一次；C＝調味料/醬料類，目視估量即可</div>
          </div>
          <div class="mb-3 d-none" id="store-field">
            <label class="form-label fw-semibold">所屬門店</label>
            <select id="item-store" class="form-select"></select>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button class="btn btn-primary" onclick="saveItem()">儲存</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script>
    let currentProfile = null;
    let allItems = [];

    document.addEventListener('DOMContentLoaded', async () => {
      await requireAuth();
      injectNav();
      const data = await renderUserInfo();
      currentProfile = data.profile;
      filterNavByRole(currentProfile.role);

      if (currentProfile.role === 'admin') {
        await loadStoresFilter();
        document.getElementById('store-filter').classList.remove('d-none');
        document.getElementById('store-field').classList.remove('d-none');
      }
      await loadItems();
    });

    async function loadStoresFilter() {
      const { data } = await supabase.from('stores').select('id, name').order('name');
      const sel1 = document.getElementById('store-filter');
      const sel2 = document.getElementById('item-store');
      (data || []).forEach(s => {
        const opt = `<option value="${s.id}">${s.name}</option>`;
        sel1.insertAdjacentHTML('beforeend', opt);
        sel2.insertAdjacentHTML('beforeend', opt);
      });
    }

    async function loadItems() {
      const storeId = currentProfile.role === 'admin'
        ? document.getElementById('store-filter').value || null
        : currentProfile.store_id;

      const itemsTable = currentProfile.role === 'admin' ? 'items' : 'items_masked';
      let q = supabase.from(itemsTable).select('*').eq('is_active', true).order('category').order('name');
      if (storeId) q = q.eq('store_id', storeId);

      const { data } = await q;
      allItems = data || [];

      // 填充廠商篩選
      const sups = [...new Set(allItems.map(i => i.supplier).filter(s => s && s !== '待確認'))].sort();
      const supSel = document.getElementById('sup-filter');
      supSel.innerHTML = '<option value="">所有廠商</option>';
      sups.forEach(s => supSel.insertAdjacentHTML('beforeend', `<option value="${s}">${s}</option>`));

      renderTable(allItems);
    }

    function filterItems() {
      const q = document.getElementById('search').value.toLowerCase();
      const sup = document.getElementById('sup-filter').value;
      renderTable(allItems.filter(i =>
        (!q || i.name.toLowerCase().includes(q) || (i.supplier||'').toLowerCase().includes(q) || (i.category||'').toLowerCase().includes(q)) &&
        (!sup || i.supplier === sup)
      ));
    }

    function renderTable(items) {
      const tbody = document.getElementById('items-table');
      if (!items.length) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-5">尚無品項，點右上角「+ 新增品項」開始建立廠商進貨清單</td></tr>';
        return;
      }
      const isAdmin = currentProfile.role === 'admin';
      tbody.innerHTML = items.map(item => {
        const locked = item.is_confidential && !isAdmin;
        const costCell = locked
          ? '<span class="text-muted">🔒 機密</span>'
          : (item.unit_cost > 0 ? `<span class="fw-semibold">$${formatNumber(item.unit_cost, 0)} / ${item.unit}</span>` : '<span class="text-muted">—</span>');
        const actionsCell = locked
          ? '<span class="text-muted" style="font-size:0.8rem;">🔒 由總部管理</span>'
          : `<button class="btn btn-sm btn-outline-primary me-1" onclick="openEditModal(${JSON.stringify(item).replace(/"/g, '&quot;')})">編輯</button>
             <button class="btn btn-sm btn-outline-danger" onclick="toggleActive('${item.id}', false)">移除</button>`;
        return `
        <tr>
          <td data-label="品項名稱"><strong>${item.name}</strong></td>
          <td data-label="類別"><span class="badge bg-light text-secondary border">${item.category || '—'}</span></td>
          <td data-label="廠商">${item.supplier || '<span class="text-muted">—</span>'}</td>
          <td data-label="單位">${item.unit}</td>
          <td data-label="標準單位成本">${costCell}</td>
          <td data-label="規格說明" class="text-muted" style="font-size:0.85rem;">${item.spec_note || '—'}</td>
          <td data-label="安全庫存">${formatNumber(item.min_stock_qty, 0)} ${item.unit}</td>
          <td data-label="ABC">
            <span class="badge ${item.abc_class === 'A' ? 'bg-danger' : item.abc_class === 'C' ? 'bg-secondary' : 'bg-warning text-dark'}">${item.abc_class || 'B'}</span>
          </td>
          <td data-label="操作">${actionsCell}</td>
        </tr>`;
      }).join('');
    }

    function updateBomHint() {
      const unit     = document.getElementById('item-unit')?.value || '進貨單位';
      const bomUnit  = document.getElementById('item-bom-unit')?.value || 'g';
      const conv     = parseFloat(document.getElementById('item-bom-conversion')?.value) || 1;
      const unitCost = parseFloat(document.getElementById('item-unit-cost')?.value) || 0;
      const servingQty = parseFloat(document.getElementById('item-serving-qty')?.value) || 0;
      const hint = document.getElementById('bom-hint');
      if (!hint) return;
      const cpbu = conv > 0 && unitCost > 0 ? `，每 ${bomUnit} 成本 ≈ $${(unitCost/conv).toFixed(3)}` : '';
      hint.textContent = `1 ${unit||'進貨單位'} = ${conv} ${bomUnit}${cpbu}`;

      const servingPreview = document.getElementById('serving-cost-preview');
      if (servingPreview) {
        if (servingQty > 0 && conv > 0) {
          const cost = (unitCost / conv) * servingQty;
          servingPreview.textContent = `1 份（${servingQty}${bomUnit}）≈ $${cost.toFixed(2)}`;
        } else {
          servingPreview.textContent = '—';
        }
      }
    }

    function openAddModal() {
      document.getElementById('modal-title').textContent = '新增進貨品項';
      document.getElementById('item-id').value = '';
      document.getElementById('item-name').value = '';
      document.getElementById('item-category').value = '';
      document.getElementById('item-supplier').value = '';
      document.getElementById('item-unit').value = '';
      document.getElementById('item-unit-cost').value = '0';
      document.getElementById('item-spec').value = '';
      document.getElementById('item-minstk').value = '0';
      document.getElementById('item-bom-unit').value = 'g';
      document.getElementById('item-bom-conversion').value = '1';
      document.getElementById('item-serving-qty').value = '';
      document.getElementById('abc-B').checked = true;
      updateBomHint();
    }

    function openEditModal(item) {
      document.getElementById('modal-title').textContent = '編輯進貨品項';
      document.getElementById('item-id').value = item.id;
      document.getElementById('item-name').value = item.name;
      document.getElementById('item-category').value = item.category || '';
      document.getElementById('item-supplier').value = item.supplier || '';
      document.getElementById('item-unit').value = item.unit;
      document.getElementById('item-unit-cost').value = item.unit_cost || 0;
      document.getElementById('item-spec').value = item.spec_note || '';
      document.getElementById('item-minstk').value = item.min_stock_qty;
      document.getElementById('item-bom-unit').value = item.bom_unit || 'g';
      document.getElementById('item-bom-conversion').value = item.bom_conversion || 1;
      document.getElementById('item-serving-qty').value = item.serving_qty || '';
      const abcVal = item.abc_class || 'B';
      const abcRadio = document.getElementById(`abc-${abcVal}`);
      if (abcRadio) abcRadio.checked = true;
      if (currentProfile.role === 'admin') {
        document.getElementById('item-store').value = item.store_id;
      }
      updateBomHint();
      new bootstrap.Modal(document.getElementById('itemModal')).show();
    }

    async function saveItem() {
      const id = document.getElementById('item-id').value;
      const storeId = currentProfile.role === 'admin'
        ? document.getElementById('item-store').value
        : currentProfile.store_id;
      const servingQty = parseFloat(document.getElementById('item-serving-qty').value) || null;

      const payload = {
        store_id: storeId,
        name: document.getElementById('item-name').value.trim(),
        category: document.getElementById('item-category').value.trim() || null,
        supplier: document.getElementById('item-supplier').value.trim() || null,
        unit: document.getElementById('item-unit').value.trim() || '個',
        unit_cost: parseFloat(document.getElementById('item-unit-cost').value) || 0,
        spec_note: document.getElementById('item-spec').value.trim() || null,
        min_stock_qty: parseFloat(document.getElementById('item-minstk').value) || 0,
        bom_unit: document.getElementById('item-bom-unit').value || 'g',
        bom_conversion: parseFloat(document.getElementById('item-bom-conversion').value) || 1,
        serving_qty: servingQty,
        abc_class: document.querySelector('input[name="abc-class"]:checked')?.value || 'B',
      };

      if (!payload.name) { showToast('請填寫品項名稱', 'danger'); return; }
      if (!payload.unit) { showToast('請填寫進貨單位', 'danger'); return; }

      // 第一次從「沒設定每份用量」變成「有設定」時，把這個品項既有配方裡的
      // std_qty（原本是原始 bom_unit 數量，例如公克數）換算成「幾份」，
      // 讓配方成本在切換當下維持不變，之後才改用「每份成本」計價。
      let priorServingQty = null;
      if (id) {
        const { data: priorItem } = await supabase.from('items').select('serving_qty').eq('id', id).maybeSingle();
        priorServingQty = priorItem?.serving_qty || null;
      }

      let error;
      if (id) {
        ({ error } = await supabase.from('items').update(payload).eq('id', id));
      } else {
        ({ error } = await supabase.from('items').insert(payload));
      }
      if (error) { showToast('儲存失敗：' + error.message, 'danger'); return; }

      if (id && !priorServingQty && servingQty > 0) {
        const { data: lines } = await supabase.from('bom_lines')
          .select('id,std_qty').eq('child_type', 'item').eq('child_id', id);
        for (const line of (lines || [])) {
          await supabase.from('bom_lines')
            .update({ std_qty: line.std_qty / servingQty, bom_unit: '份' })
            .eq('id', line.id);
        }
        if (lines?.length) showToast(`已將 ${lines.length} 筆既有配方換算成「份數」計價`, 'success');
      }

      bootstrap.Modal.getInstance(document.getElementById('itemModal')).hide();
      showToast(id ? '品項已更新' : '品項已新增');
      await loadItems();
    }

    async function toggleActive(id, isActive) {
      const { error } = await supabase.from('items').update({ is_active: isActive }).eq('id', id);
      if (error) { showToast('操作失敗', 'danger'); return; }
      showToast('品項已移除');
      await loadItems();
    }
  </script>
</body>
</html>
