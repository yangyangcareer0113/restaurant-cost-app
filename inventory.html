<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>庫存總覽 — 烽味營運管理系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="main-content">
    <div class="top-header">
      <button class="btn btn-sm btn-outline-secondary d-md-none me-2" onclick="toggleSidebar()">☰</button>
      <h6 class="mb-0 fw-bold">庫存總覽</h6>
      <div class="ms-auto d-flex gap-2">
        <select id="store-filter" class="form-select form-select-sm d-none" style="width:auto;" onchange="loadInventory()">
          <option value="">所有門店</option>
        </select>
        <select id="alert-filter" class="form-select form-select-sm" style="width:auto;" onchange="renderTable()">
          <option value="all">全部</option>
          <option value="alert">僅預警</option>
          <option value="ok">正常</option>
        </select>
      </div>
    </div>

    <div class="page-body">
      <!-- 統計 -->
      <div class="row g-3 mb-3">
        <div class="col-4">
          <div class="stat-card text-center">
            <div class="stat-value" id="cnt-total">—</div>
            <div class="stat-label">品項總數</div>
          </div>
        </div>
        <div class="col-4">
          <div class="stat-card text-center">
            <div class="stat-value text-warning" id="cnt-warn">—</div>
            <div class="stat-label">⚠️ 偏低</div>
          </div>
        </div>
        <div class="col-4">
          <div class="stat-card text-center">
            <div class="stat-value text-danger" id="cnt-danger">—</div>
            <div class="stat-label">🔴 嚴重不足</div>
          </div>
        </div>
      </div>

      <div class="table-card">
        <div class="p-2 px-3 border-bottom">
          <input type="text" id="search" class="form-control form-control-sm" placeholder="搜尋品項名稱..." oninput="renderTable()">
        </div>
        <div class="table-responsive">
          <table class="table table-hover mb-0 table-responsive-card">
            <thead>
              <tr>
                <th>品項</th>
                <th>分類</th>
                <th>單位</th>
                <th>安全庫存</th>
                <th>當前庫存</th>
                <th>狀態</th>
                <th>最後記錄</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="inv-table">
              <tr><td colspan="8" class="text-center text-muted py-4">載入中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script>
    let currentProfile = null;
    let inventoryData = [];

    document.addEventListener('DOMContentLoaded', async () => {
      await requireAuth();
      injectNav();
      const data = await renderUserInfo();
      currentProfile = data.profile;
      filterNavByRole(currentProfile.role);

      if (currentProfile.role === 'admin') {
        await loadStoresFilter();
        document.getElementById('store-filter').classList.remove('d-none');
      }
      await loadInventory();
    });

    async function loadStoresFilter() {
      const { data } = await supabase.from('stores').select('id, name').order('name');
      const sel = document.getElementById('store-filter');
      (data || []).forEach(s => sel.insertAdjacentHTML('beforeend', `<option value="${s.id}">${s.name}</option>`));
    }

    async function loadInventory() {
      const storeId = currentProfile.role === 'admin'
        ? document.getElementById('store-filter').value || null
        : currentProfile.store_id;

      // 取所有啟用品項
      let itemQuery = supabase.from('items').select('id, name, unit, category, min_stock_qty').eq('is_active', true).order('category').order('name');
      if (storeId) itemQuery = itemQuery.eq('store_id', storeId);
      const { data: items } = await itemQuery;

      // 取每個品項最新一筆庫存記錄
      let recQuery = supabase.from('inventory_records')
        .select('item_id, current_stock, record_date')
        .order('record_date', { ascending: false });
      if (storeId) recQuery = recQuery.eq('store_id', storeId);
      const { data: records } = await recQuery;

      const latestMap = {};
      (records || []).forEach(r => {
        if (!latestMap[r.item_id]) latestMap[r.item_id] = r;
      });

      inventoryData = (items || []).map(item => ({
        ...item,
        current_stock: latestMap[item.id]?.current_stock ?? null,
        last_date: latestMap[item.id]?.record_date ?? null
      }));

      // 統計
      const warns = inventoryData.filter(i => i.current_stock !== null && stockAlertLevel(i.current_stock, i.min_stock_qty) === 'warning').length;
      const dangers = inventoryData.filter(i => i.current_stock !== null && stockAlertLevel(i.current_stock, i.min_stock_qty) === 'danger').length;
      document.getElementById('cnt-total').textContent = inventoryData.length;
      document.getElementById('cnt-warn').textContent = warns;
      document.getElementById('cnt-danger').textContent = dangers;

      renderTable();
    }

    function renderTable() {
      const q = document.getElementById('search').value.toLowerCase();
      const filter = document.getElementById('alert-filter').value;

      let data = inventoryData.filter(i => i.name.toLowerCase().includes(q) || (i.category || '').toLowerCase().includes(q));
      if (filter === 'alert') data = data.filter(i => stockAlertLevel(i.current_stock, i.min_stock_qty) !== 'ok');
      if (filter === 'ok') data = data.filter(i => stockAlertLevel(i.current_stock, i.min_stock_qty) === 'ok');

      const tbody = document.getElementById('inv-table');
      if (!data.length) {
        tbody.innerHTML = `<tr><td colspan="8" class="text-center text-muted py-4">沒有符合條件的品項</td></tr>`;
        return;
      }

      tbody.innerHTML = data.map(item => {
        const level = item.current_stock !== null ? stockAlertLevel(item.current_stock, item.min_stock_qty) : 'ok';
        const badgeCls = level === 'danger' ? 'badge-stock-danger' : level === 'warning' ? 'badge-stock-warning' : 'badge-stock-ok';
        const badgeText = level === 'danger' ? '🔴 嚴重不足' : level === 'warning' ? '⚠️ 偏低' : '✅ 正常';
        const stockDisplay = item.current_stock !== null ? `<strong class="stock-${level}">${item.current_stock}</strong>` : '<span class="text-muted">未記錄</span>';

        return `
          <tr>
            <td data-label="品項"><strong>${item.name}</strong></td>
            <td data-label="分類">${item.category || '—'}</td>
            <td data-label="單位">${item.unit}</td>
            <td data-label="安全庫存">${item.min_stock_qty} ${item.unit}</td>
            <td data-label="當前庫存">${stockDisplay} ${item.unit}</td>
            <td data-label="狀態"><span class="badge ${badgeCls}">${badgeText}</span></td>
            <td data-label="最後記錄">${item.last_date || '—'}</td>
            <td data-label="操作">
              <a href="records.html" class="btn btn-sm btn-outline-primary">更新</a>
            </td>
          </tr>`;
      }).join('');
    }
  </script>
</body>
</html>
