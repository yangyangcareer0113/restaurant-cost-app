<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登入 — 烽味營運管理系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, 'Noto Sans TC', sans-serif;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-logo {
      font-size: 2.5rem;
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .login-title {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-title h4 { font-weight: 700; color: #1e293b; }
    .login-title p { font-size: 0.85rem; color: #64748b; margin: 0; }
    input { font-size: 16px !important; }
    .btn-primary { background: #2563eb; border-color: #2563eb; }
    .btn-primary:hover { background: #1d4ed8; border-color: #1d4ed8; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">🍜</div>
    <div class="login-title">
      <h4>烽味營運管理系統</h4>
      <p>請登入您的帳號</p>
    </div>

    <form id="login-form">
      <div class="mb-3">
        <label class="form-label fw-semibold">電子郵件</label>
        <input type="email" id="email" class="form-control form-control-lg" placeholder="your@email.com" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">密碼</label>
        <input type="password" id="password" class="form-control form-control-lg" placeholder="••••••••" required>
      </div>
      <button type="submit" id="login-btn" class="btn btn-primary w-100 btn-lg">
        登入
      </button>
    </form>

    <div id="error-msg" class="alert alert-danger mt-3 d-none"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script>
    // 已登入就直接跳儀表板
    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) window.location.href = 'dashboard.html';
    })();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('error-msg');
      btn.disabled = true;
      btn.textContent = '登入中...';
      errEl.classList.add('d-none');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        errEl.textContent = '帳號或密碼錯誤，請重試';
        errEl.classList.remove('d-none');
        btn.disabled = false;
        btn.textContent = '登入';
      } else {
        window.location.href = 'dashboard.html';
      }
    });
  </script>
</body>
</html>
