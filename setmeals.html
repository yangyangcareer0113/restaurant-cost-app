<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>套餐管理 — 烽味營運管理系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <style>
    .bom-badge { font-size: 0.72rem; padding: 0.18rem 0.55rem; border-radius: 20px; font-weight: 600; white-space: nowrap; }
    .bom-star   { background: #dcfce7; color: #14532d; }
    .bom-good   { background: #d1fae5; color: #065f46; }
    .bom-warn   { background: #fef3c7; color: #92400e; }
    .bom-danger { background: #fee2e2; color: #991b1b; }
    .bom-crit   { background: #dc2626; color: #fff; }
    .bom-unk    { background: #f3f4f6; color: #6b7280; }
    .meal-bom { background: #f8fafc; border-top: 1px solid #e2e8f0; }
    .meal-bom table { font-size: 0.85rem; margin-bottom: 0; }
    .meal-bom th { font-size: 0.75rem; background: #f1f5f9; }
    .cost-total-row { background: #fffbeb; font-weight: 700; }
    .expand-btn { cursor: pointer; user-select: none; }
  </style>
</head>
<body>
<div class="main-content">
  <div class="top-header">
    <button class="btn btn-sm btn-outline-secondary d-md-none me-2" onclick="toggleSidebar()">☰</button>
    <h6 class="mb-0 fw-bold">🎉 套餐管理</h6>
    <div class="ms-auto d-flex gap-2">
      <select id="store-filter" class="form-select form-select-sm d-none" style="width:auto;" onchange="loadMeals()">
        <option value="">所有門店</option>
      </select>
      <button class="btn btn-sm btn-primary" onclick="openAddMealModal()">+ 新增套餐</button>
    </div>
  </div>

  <div class="page-body">

    <!-- 套餐列表 -->
    <div class="table-card mb-3">
      <div class="table-header">
        <span class="fw-semibold">套餐列表</span>
        <small class="text-muted">點「BOM 明細」展開品項成本</small>
      </div>
      <div id="meals-container">
        <div class="text-center text-muted py-4">載入中...</div>
      </div>
    </div>

    <div class="text-muted" style="font-size:0.8rem;">
      💡 成本率目標：25–33%（火鍋套餐）。升級選項的額外毛利 = 加收金額 − 成本差額，請在明細中記錄升級品項。
    </div>

  </div>
</div>

<!-- 新增/編輯套餐 Modal -->
<div class="modal fade" id="mealModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="meal-modal-title">新增套餐</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="meal-id">
        <div class="mb-3">
          <label class="form-label fw-semibold">套餐名稱 <span class="text-danger">*</span></label>
          <input type="text" id="meal-name" class="form-control" placeholder="例：豪華雙人饗宴套餐">
        </div>
        <div class="row g-2 mb-3">
          <div class="col-6">
            <label class="form-label fw-semibold">定價（元）</label>
            <input type="number" id="meal-price" class="form-control" min="0" step="1" value="0">
          </div>
          <div class="col-6 d-none" id="meal-store-wrap">
            <label class="form-label fw-semibold">所屬門店</label>
            <select id="meal-store" class="form-select"></select>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">備注說明</label>
          <textarea id="meal-desc" class="form-control" rows="2" placeholder="例：不含10%服務費、可選升級"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button class="btn btn-primary" onclick="saveMeal()">儲存</button>
      </div>
    </div>
  </div>
</div>

<!-- 新增/編輯 BOM 品項 Modal -->
<div class="modal fade" id="smiModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="smi-modal-title">新增品項</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="smi-id">
        <input type="hidden" id="smi-meal-id">
        <div class="mb-3" id="smi-dish-wrap">
          <label class="form-label fw-semibold">選擇原物料 <span class="text-danger">*</span></label>
          <div class="position-relative">
            <input type="text" id="smi-dish-search" class="form-control" placeholder="輸入關鍵字搜尋原物料" autocomplete="off" oninput="onDishSearchInput()" onfocus="onDishSearchInput()">
            <div id="smi-dish-dropdown" class="list-group position-absolute w-100 d-none" style="z-index:1060; max-height:220px; overflow-y:auto; box-shadow:0 6px 16px rgba(0,0,0,0.15);"></div>
          </div>
          <input type="hidden" id="smi-dish-select">
          <div class="form-text">🧾 原物料＝鍋底/湯鍋內的食材、藥材，跟進貨時 Key 的品項名稱一致</div>
          <div class="form-text">找不到想要的品項？<a href="#" onclick="event.preventDefault(); toggleManualEntry();">改用手動輸入</a></div>
        </div>
        <div class="mb-3 d-none" id="manual-entry-wrap">
          <label class="form-label fw-semibold">手動輸入品項名稱</label>
          <input type="text" id="smi-name" class="form-control" placeholder="例：加購飲料、季節限定小菜">
          <div class="form-text">找到了？<a href="#" onclick="event.preventDefault(); toggleManualEntry();">改回選單選擇</a></div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">數量</label>
          <input type="number" id="smi-qty" class="form-control" min="0.1" step="1" value="1" oninput="recalcSmiCost()">
        </div>
        <div class="mb-3 d-none" id="admin-cost-wrap">
          <label class="form-label fw-semibold">成本估算（元）</label>
          <input type="number" id="smi-cost" class="form-control" min="0" step="0.01" value="0" oninput="updateCostPreview()">
        </div>
        <div class="mb-3 p-2 bg-light rounded d-flex justify-content-between align-items-center">
          <span class="text-muted" style="font-size:0.85rem;">此品項預估成本</span>
          <strong id="cost-preview">—</strong>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">備注</label>
          <input type="text" id="smi-notes" class="form-control" placeholder="例：套餐份量較單點小">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button class="btn btn-primary" onclick="saveSmi()">儲存</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/nav.js"></script>
<script>
  let currentProfile = null;
  let allMeals = [];
  let allDishes = [];       // 成品菜單品項，供「選擇菜品」下拉選單使用
  let dishCostMap = {};     // dish_id → 真實總成本（來自 dishes_total_cost RPC）
  let allItems = [];        // 原物料（含中藥材等機密品項），供「選擇原物料」下拉選單使用
  let allItemsMap = {};     // item_id → {name, unit, unit_cost, is_confidential}（非 admin 機密品項 unit_cost 為 null）
  let mealTrueCost = {};    // set_meal_id → 真實總成本（來自 set_meals_total_cost RPC）
  let manualMode = false;

  const RC = {
    star:   { badge: 'bom-star',   label: '⭐ 優秀'   },
    good:   { badge: 'bom-good',   label: '✅ 良好'   },
    warn:   { badge: 'bom-warn',   label: '⚠️ 警示'  },
    danger: { badge: 'bom-danger', label: '🚨 危險'   },
    crit:   { badge: 'bom-crit',   label: '🔴 虧損'   },
    unk:    { badge: 'bom-unk',    label: '⚑ 待確認' },
  };

  function ratingFromRate(rate) {
    if (rate < 20) return 'star';
    if (rate < 30) return 'good';
    if (rate <= 45) return 'warn';
    if (rate <= 60) return 'danger';
    return 'crit';
  }

  document.addEventListener('DOMContentLoaded', async () => {
    await requireAuth();
    injectNav();
    const d = await renderUserInfo();
    currentProfile = d.profile;
    filterNavByRole(currentProfile.role);

    if (currentProfile.role === 'admin') {
      const { data } = await supabase.from('stores').select('id,name').order('name');
      const sel = document.getElementById('store-filter');
      const sel2 = document.getElementById('meal-store');
      (data || []).forEach(s => {
        sel.insertAdjacentHTML('beforeend', `<option value="${s.id}">${s.name}</option>`);
        sel2.insertAdjacentHTML('beforeend', `<option value="${s.id}">${s.name}</option>`);
      });
      sel.classList.remove('d-none');
      document.getElementById('meal-store-wrap').classList.remove('d-none');
    }

    // 載入成品菜單（供「選擇菜品」下拉選單使用，例如套餐裡包哪些成品菜）
    const isAdmin = currentProfile.role === 'admin';
    let dishQ = supabase.from('dishes').select('id,name,category,store_id,selling_price').eq('is_active', true).order('category').order('name');
    if (!isAdmin) dishQ = dishQ.eq('store_id', currentProfile.store_id);
    const { data: dishData } = await dishQ;
    allDishes = dishData || [];

    // 載入原物料（供「選擇原物料」下拉選單使用，例如鍋底/湯鍋裡用了哪些中藥材）
    // 非 admin 用遮蔽 view：機密品項名稱看得到、可以選，但 unit_cost 會是 null（前端不會算出金額）
    const itemsTable = isAdmin ? 'items' : 'items_masked';
    let itemsQ = supabase.from(itemsTable).select('id,name,category,unit,unit_cost,bom_conversion,serving_qty,is_confidential').eq('is_active', true).order('category').order('name');
    if (!isAdmin) itemsQ = itemsQ.eq('store_id', currentProfile.store_id);
    const { data: itemsData } = await itemsQ;
    allItems = itemsData || [];
    allItemsMap = {};
    allItems.forEach(i => { allItemsMap[i.id] = i; });

    await loadMeals();
  });

  async function loadMeals() {
    const isAdmin = currentProfile.role === 'admin';
    const storeId = isAdmin
      ? document.getElementById('store-filter').value || null
      : currentProfile.store_id;

    if (isAdmin) {
      let q = supabase.from('set_meals').select('*, set_meal_items(*)').order('name');
      if (storeId) q = q.eq('store_id', storeId);
      const { data } = await q;
      allMeals = data || [];
    } else {
      // 門店帳號：套餐主檔 + 遮蔽後的品項明細分開查（view 沒有 FK metadata 不能用 embed 語法），
      // 前端用 set_meal_id 手動組回去
      let q = supabase.from('set_meals').select('*');
      if (storeId) q = q.eq('store_id', storeId);
      const { data: meals } = await q;
      const mealIds = (meals || []).map(m => m.id);
      let smiRows = [];
      if (mealIds.length) {
        const { data } = await supabase.from('set_meal_items_masked').select('*').in('set_meal_id', mealIds);
        smiRows = data || [];
      }
      allMeals = (meals || []).map(m => ({ ...m, set_meal_items: smiRows.filter(r => r.set_meal_id === m.id) }));
    }

    // 套餐總成本 & 菜品成本一律用資料庫 RPC 算出的真實值（含機密品項成本在內，但不外洩明細）
    const storeIds = [...new Set(allMeals.map(m => m.store_id).filter(Boolean))];
    mealTrueCost = {};
    dishCostMap = {};
    await Promise.all(storeIds.map(async sid => {
      const [{ data: mealRows }, { data: dishRows }] = await Promise.all([
        supabase.rpc('set_meals_total_cost', { p_store_id: sid }),
        supabase.rpc('dishes_total_cost', { p_store_id: sid })
      ]);
      (mealRows || []).forEach(r => { mealTrueCost[r.set_meal_id] = r.total_cost; });
      (dishRows || []).forEach(r => { dishCostMap[r.dish_id] = r.total_cost; });
    }));

    renderMeals(allMeals);
  }

  function renderMeals(meals) {
    const container = document.getElementById('meals-container');
    if (!meals.length) {
      container.innerHTML = '<div class="text-center text-muted py-4">尚無套餐，點右上角新增</div>';
      return;
    }

    const isAdmin = currentProfile.role === 'admin';
    container.innerHTML = meals.map(meal => {
      const items = meal.set_meal_items || [];
      const totalCost = mealTrueCost[meal.id] !== undefined
        ? mealTrueCost[meal.id]
        : items.reduce((s, i) => s + (i.dish_id ? (dishCostMap[i.dish_id] || 0) * (i.qty || 1) : (i.cost_est || 0)), 0);
      const rate = meal.price > 0 ? (totalCost / meal.price * 100) : 0;
      const rKey = items.length ? ratingFromRate(rate) : 'unk';
      const rc = RC[rKey];
      const rateStr = items.length && meal.price > 0 ? rate.toFixed(1) + '%' : '—';

      return `
      <div class="border-bottom">
        <!-- 套餐主列 -->
        <div class="d-flex align-items-center p-3 gap-3 flex-wrap">
          <div class="flex-grow-1">
            <strong>${meal.name}</strong>
            ${meal.description ? `<div class="text-muted" style="font-size:0.8rem;">${meal.description}</div>` : ''}
          </div>
          <div class="d-flex gap-3 align-items-center text-center flex-wrap">
            <div>
              <div class="fw-bold text-primary">$${formatNumber(meal.price, 0)}</div>
              <div class="text-muted" style="font-size:0.72rem;">定價</div>
            </div>
            <div>
              <div class="fw-bold">$${formatNumber(totalCost, 0)}</div>
              <div class="text-muted" style="font-size:0.72rem;">估算成本</div>
            </div>
            <div>
              <span class="bom-badge ${rc.badge}">${rateStr} ${rc.label}</span>
            </div>
          </div>
          <div class="d-flex gap-1 flex-shrink-0">
            <button class="btn btn-sm btn-outline-secondary expand-btn" onclick="toggleBOM('bom-${meal.id}', this)">
              BOM 明細 ▼
            </button>
            <button class="btn btn-sm btn-outline-primary" onclick="openEditMealModal(${JSON.stringify(meal).replace(/"/g,'&quot;')})">編輯</button>
            <button class="btn btn-sm btn-outline-danger" onclick="deleteMeal('${meal.id}')">刪除</button>
          </div>
        </div>

        <!-- BOM 展開區 -->
        <div id="bom-${meal.id}" class="meal-bom d-none px-3 py-2">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <span class="fw-semibold" style="font-size:0.85rem;">品項成本明細</span>
            <button class="btn btn-sm btn-outline-success" onclick="openAddSmiModal('${meal.id}')">+ 新增品項</button>
          </div>
          <table class="table table-bordered table-hover">
            <thead>
              <tr>
                <th>品項名稱</th>
                <th>成本估算</th>
                <th>備注</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              ${items.length ? items.sort((a,b)=>a.sort_order-b.sort_order).map(it => {
                const isDishBased = !!it.dish_id;
                // set_meal_items_masked view 已經把機密品項連結的 cost_est 遮成 null；admin 端一定看得到真實值
                const locked = !isDishBased && !isAdmin && it.item_id && (it.cost_est === null || it.cost_est === undefined);
                const lineCost = isDishBased ? (dishCostMap[it.dish_id] || 0) * (it.qty || 1) : (it.cost_est || 0);
                const qtyTag = it.qty && it.qty != 1 ? ` × ${formatNumber(it.qty, 0)}` : '';
                return `
                <tr>
                  <td>${it.item_name}${qtyTag}</td>
                  <td class="fw-bold">${locked ? '🔒 機密' : `$${formatNumber(lineCost, 0)}`}</td>
                  <td class="text-muted">${it.notes || '—'}</td>
                  <td>
                    ${locked ? '<span class="text-muted" style="font-size:0.78rem;">🔒 由總部管理</span>' : `
                    <button class="btn btn-xs btn-outline-primary btn-sm py-0 px-2 me-1"
                      onclick="openEditSmiModal(${JSON.stringify(it).replace(/"/g,'&quot;')})">編輯</button>
                    <button class="btn btn-xs btn-outline-danger btn-sm py-0 px-2"
                      onclick="deleteSmi('${it.id}', '${meal.id}')">刪除</button>`}
                  </td>
                </tr>
              `;}).join('') : '<tr><td colspan="4" class="text-center text-muted">尚無品項，點「新增品項」開始建立 BOM</td></tr>'}
            </tbody>
            ${items.length ? `
            <tfoot>
              <tr class="cost-total-row">
                <td colspan="2"><strong>套餐合計（定價 $${formatNumber(meal.price,0)}）</strong></td>
                <td><strong>$${formatNumber(totalCost,0)}</strong></td>
                <td colspan="2"><strong>成本率 ${rateStr}</strong>
                  ${meal.price > 0 && items.length ? `— 毛利 $${formatNumber(meal.price - totalCost, 0)}` : ''}
                </td>
              </tr>
            </tfoot>` : ''}
          </table>
        </div>
      </div>`;
    }).join('');
  }

  function toggleBOM(id, btn) {
    const el = document.getElementById(id);
    el.classList.toggle('d-none');
    btn.textContent = el.classList.contains('d-none') ? 'BOM 明細 ▼' : 'BOM 明細 ▲';
  }

  // ---- 套餐 CRUD ----

  function openAddMealModal() {
    document.getElementById('meal-modal-title').textContent = '新增套餐';
    document.getElementById('meal-id').value = '';
    document.getElementById('meal-name').value = '';
    document.getElementById('meal-price').value = '0';
    document.getElementById('meal-desc').value = '';
    new bootstrap.Modal(document.getElementById('mealModal')).show();
  }

  function openEditMealModal(meal) {
    document.getElementById('meal-modal-title').textContent = '編輯套餐';
    document.getElementById('meal-id').value = meal.id;
    document.getElementById('meal-name').value = meal.name;
    document.getElementById('meal-price').value = meal.price;
    document.getElementById('meal-desc').value = meal.description || '';
    if (currentProfile.role === 'admin') document.getElementById('meal-store').value = meal.store_id;
    new bootstrap.Modal(document.getElementById('mealModal')).show();
  }

  async function saveMeal() {
    const id = document.getElementById('meal-id').value;
    const storeId = currentProfile.role === 'admin'
      ? document.getElementById('meal-store').value
      : currentProfile.store_id;
    const name = document.getElementById('meal-name').value.trim();
    if (!name) { showToast('請填寫套餐名稱', 'danger'); return; }
    const payload = {
      store_id: storeId, name,
      price: parseFloat(document.getElementById('meal-price').value) || 0,
      description: document.getElementById('meal-desc').value.trim() || null,
    };
    let error;
    if (id) {
      ({ error } = await supabase.from('set_meals').update(payload).eq('id', id));
    } else {
      ({ error } = await supabase.from('set_meals').insert(payload));
    }
    if (error) { showToast('儲存失敗：' + error.message, 'danger'); return; }
    bootstrap.Modal.getInstance(document.getElementById('mealModal')).hide();
    showToast(id ? '套餐已更新' : '套餐已新增');
    await loadMeals();
  }

  async function deleteMeal(id) {
    if (!confirm('確定刪除此套餐？（BOM 明細也會一併刪除）')) return;
    const { error } = await supabase.from('set_meals').delete().eq('id', id);
    if (error) { showToast('刪除失敗', 'danger'); return; }
    showToast('套餐已刪除');
    await loadMeals();
  }

  // ---- BOM 品項 CRUD ----

  // 顯示名稱（含機密標記）
  function itemLabel(item) {
    return item ? item.name + (item.is_confidential ? ' 🔒' : '') : '';
  }

  // 設定目前選中的品項（同時更新隱藏值與搜尋框顯示文字），供編輯既有品項時回填用
  function setSmiDishSelection(value) {
    document.getElementById('smi-dish-select').value = value || '';
    let label = '';
    if (value && value.startsWith('item:')) {
      label = itemLabel(allItemsMap[value.split(':')[1]]);
    }
    document.getElementById('smi-dish-search').value = label;
  }

  // 搜尋框輸入/聚焦時：即時列出名稱包含關鍵字的原物料供點選。
  // 不用瀏覽器原生 datalist——它在 iPad/Safari 上常常整串比對失敗或完全不篩選，
  // 改成自己控制的下拉清單才能保證「打關鍵字→列出所有符合的品項」在任何裝置都可靠。
  function onDishSearchInput() {
    const dropdown = document.getElementById('smi-dish-dropdown');
    const q = document.getElementById('smi-dish-search').value.trim();
    if (!q) { dropdown.classList.add('d-none'); dropdown.innerHTML = ''; return; }
    const matches = allItems.filter(i => i.name.includes(q)).slice(0, 30);
    dropdown.innerHTML = matches.length
      ? matches.map(i => `<button type="button" class="list-group-item list-group-item-action" onclick="selectDishOption('item:${i.id}')">${itemLabel(i)}</button>`).join('')
      : '<div class="list-group-item text-muted" style="font-size:0.85rem;">沒有符合的原物料，可改用手動輸入</div>';
    dropdown.classList.remove('d-none');
  }

  function selectDishOption(value) {
    setSmiDishSelection(value);
    document.getElementById('smi-dish-dropdown').classList.add('d-none');
    recalcSmiCost();
  }

  document.addEventListener('click', (e) => {
    const wrap = document.getElementById('smi-dish-wrap');
    if (wrap && !wrap.contains(e.target)) {
      document.getElementById('smi-dish-dropdown')?.classList.add('d-none');
    }
  });

  function toggleManualEntry() {
    manualMode = !manualMode;
    document.getElementById('manual-entry-wrap').classList.toggle('d-none', !manualMode);
    document.getElementById('smi-dish-wrap').classList.toggle('d-none', manualMode);
    if (manualMode) setSmiDishSelection('');
    else document.getElementById('smi-name').value = '';
    updateCostPreview();
  }

  // 搜尋框輸入時：找到完全符合的原物料名稱才會解析成真正的品項 id，
  // 選到品項，或數量改變時都要重算：非機密原物料用真實每份/每單位成本 × 數量帶入建議成本（可再手動覆蓋）
  function recalcSmiCost() {
    const val = document.getElementById('smi-dish-select').value;
    if (val) {
      const [type, pid] = val.split(':');
      if (type === 'item') {
        const item = allItemsMap[pid];
        const locked = item && item.is_confidential && currentProfile.role !== 'admin';
        if (item && !locked) {
          const qty = parseFloat(document.getElementById('smi-qty').value) || 1;
          document.getElementById('smi-cost').value = Math.round(calcItemLineCost(item, qty, 0));
        }
      }
    }
    updateCostPreview();
  }

  function updateCostPreview() {
    const preview = document.getElementById('cost-preview');
    const wrap = document.getElementById('admin-cost-wrap');
    const qty = parseFloat(document.getElementById('smi-qty').value) || 1;

    if (manualMode) {
      wrap.classList.remove('d-none');
      const cost = parseFloat(document.getElementById('smi-cost').value) || 0;
      preview.textContent = '$' + formatNumber(cost, 0);
      return;
    }

    const val = document.getElementById('smi-dish-select').value;
    if (!val) { wrap.classList.add('d-none'); preview.textContent = '—'; return; }
    const [type, pid] = val.split(':');
    if (type === 'dish') {
      wrap.classList.add('d-none');
      preview.textContent = '$' + formatNumber((dishCostMap[pid] || 0) * qty, 0);
      return;
    }
    // type === 'item'：非機密品項可手動輸入/覆蓋成本；機密品項鎖住
    const item = allItemsMap[pid];
    const locked = item && item.is_confidential && currentProfile.role !== 'admin';
    wrap.classList.toggle('d-none', locked);
    if (locked) { preview.textContent = '🔒 由總部設定'; return; }
    const cost = parseFloat(document.getElementById('smi-cost').value) || 0;
    preview.textContent = '$' + formatNumber(cost, 0);
  }

  function openAddSmiModal(mealId) {
    document.getElementById('smi-modal-title').textContent = '新增品項';
    document.getElementById('smi-id').value = '';
    document.getElementById('smi-meal-id').value = mealId;
    document.getElementById('smi-name').value = '';
    document.getElementById('smi-qty').value = '1';
    document.getElementById('smi-cost').value = '0';
    document.getElementById('smi-notes').value = '';
    manualMode = false;
    document.getElementById('manual-entry-wrap').classList.add('d-none');
    document.getElementById('smi-dish-wrap').classList.remove('d-none');
    document.getElementById('smi-dish-search').disabled = false;
    document.getElementById('smi-dish-dropdown').classList.add('d-none');
    setSmiDishSelection('');
    updateCostPreview();
    new bootstrap.Modal(document.getElementById('smiModal')).show();
  }

  function openEditSmiModal(item) {
    document.getElementById('smi-modal-title').textContent = '編輯品項';
    document.getElementById('smi-id').value = item.id;
    document.getElementById('smi-meal-id').value = item.set_meal_id;
    document.getElementById('smi-qty').value = item.qty || 1;
    document.getElementById('smi-notes').value = item.notes || '';
    document.getElementById('smi-dish-dropdown').classList.add('d-none');

    manualMode = !item.dish_id && !item.item_id;
    document.getElementById('manual-entry-wrap').classList.toggle('d-none', !manualMode);
    document.getElementById('smi-dish-wrap').classList.toggle('d-none', manualMode);
    const searchInput = document.getElementById('smi-dish-search');

    if (manualMode) {
      setSmiDishSelection('');
      searchInput.disabled = false;
      document.getElementById('smi-name').value = item.item_name;
      document.getElementById('smi-cost').value = item.cost_est || 0;
    } else if (item.dish_id) {
      // 舊資料相容：套餐新增品項現在只給選原物料，這類舊的成品菜連結維持顯示但不可再用這個欄位改選
      document.getElementById('smi-dish-select').value = 'dish:' + item.dish_id;
      searchInput.value = (allDishes.find(d => d.id === item.dish_id)?.name || '（成品菜，僅供參考）') + '　🍽️ 舊資料，成本由總部自動試算';
      searchInput.disabled = true;
      document.getElementById('smi-name').value = '';
      document.getElementById('smi-cost').value = item.cost_est || 0;
    } else {
      searchInput.disabled = false;
      setSmiDishSelection('item:' + item.item_id);
      document.getElementById('smi-name').value = '';
      document.getElementById('smi-cost').value = item.cost_est || 0;
    }
    updateCostPreview();
    new bootstrap.Modal(document.getElementById('smiModal')).show();
  }

  async function saveSmi() {
    const id = document.getElementById('smi-id').value;
    const mealId = document.getElementById('smi-meal-id').value;
    const qty = parseFloat(document.getElementById('smi-qty').value) || 1;

    let dishId = null, itemId = null, name, costEst;
    if (!manualMode) {
      const val = document.getElementById('smi-dish-select').value;
      if (!val) { showToast('請選擇品項', 'danger'); return; }
      const [type, pid] = val.split(':');
      if (type === 'dish') {
        const dish = allDishes.find(d => d.id === pid);
        if (!dish) { showToast('請選擇菜品', 'danger'); return; }
        dishId = pid; name = dish.name;
        costEst = null; // 套餐內的成品菜，成本由 dish_total_cost 自動算，不存手動值
      } else {
        const item = allItemsMap[pid];
        if (!item) { showToast('請選擇原物料', 'danger'); return; }
        itemId = pid; name = item.name;
        const locked = item.is_confidential && currentProfile.role !== 'admin';
        // 非機密原物料：員工自己輸入的成本估算；機密品項員工端不存值，由總部另外填
        costEst = locked ? null : (parseFloat(document.getElementById('smi-cost').value) || 0);
      }
    } else {
      name = document.getElementById('smi-name').value.trim();
      if (!name) { showToast('請選擇品項或輸入品項名稱', 'danger'); return; }
      costEst = parseFloat(document.getElementById('smi-cost').value) || 0;
    }

    const payload = {
      set_meal_id: mealId, dish_id: dishId, item_id: itemId, item_name: name, qty,
      cost_est: costEst,
      notes: document.getElementById('smi-notes').value.trim() || null,
    };
    let error;
    if (id) {
      ({ error } = await supabase.from('set_meal_items').update(payload).eq('id', id));
    } else {
      ({ error } = await supabase.from('set_meal_items').insert(payload));
    }
    if (error) { showToast('儲存失敗：' + error.message, 'danger'); return; }
    bootstrap.Modal.getInstance(document.getElementById('smiModal')).hide();
    showToast(id ? '品項已更新' : '品項已新增');
    await loadMeals();
  }

  async function deleteSmi(id, mealId) {
    if (!confirm('確定刪除此品項？')) return;
    const { error } = await supabase.from('set_meal_items').delete().eq('id', id);
    if (error) { showToast('刪除失敗', 'danger'); return; }
    showToast('品項已刪除');
    await loadMeals();
    // re-open the BOM section
    const bomEl = document.getElementById('bom-' + mealId);
    if (bomEl) bomEl.classList.remove('d-none');
  }
</script>
</body>
</html>
