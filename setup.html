<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>初始設定 — 烽味營運管理系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f1f5f9; font-family: -apple-system, 'Noto Sans TC', sans-serif; }
    .setup-card { max-width: 560px; margin: 2rem auto; background: #fff; border-radius: 16px; padding: 2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    h5 { font-weight: 700; color: #1e293b; }
    .step-badge { background: #2563eb; color: #fff; border-radius: 50%; width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 700; margin-right: 0.5rem; }
    .step-badge.done { background: #16a34a; }
    input, select { font-size: 16px !important; }
    .alert-warning { font-size: 0.85rem; }
    .section-locked { opacity: 0.4; pointer-events: none; }
  </style>
</head>
<body>
  <div class="setup-card">
    <div class="text-center mb-4">
      <div style="font-size:2.5rem;">🍜</div>
      <h5>烽味營運管理系統 — 初始設定</h5>
      <p class="text-muted" style="font-size:0.85rem;">請依序完成三個步驟，完成後刪除此頁面</p>
    </div>

    <div class="alert alert-warning mb-4">
      ⚠️ <strong>前置步驟（必做）：</strong><br>
      前往 <strong>Supabase Dashboard → Authentication → Providers → Email</strong>，
      關閉 <strong>「Confirm email」</strong> 開關後，再繼續以下步驟。
    </div>

    <!-- Step 1：建立管理員帳號 -->
    <div id="step1-section" class="mb-4">
      <h6><span class="step-badge" id="badge1">1</span>建立管理員帳號（先做這步）</h6>
      <div class="mb-2">
        <input type="email" id="admin-email" class="form-control mb-2" placeholder="管理員 Email">
        <input type="password" id="admin-password" class="form-control mb-2" placeholder="密碼（至少 8 碼）">
        <input type="text" id="admin-name" class="form-control" placeholder="姓名（例：王老闆）">
      </div>
      <button class="btn btn-primary w-100" onclick="createAdmin()">建立管理員帳號並登入</button>
      <div id="admin-result" class="mt-2"></div>
    </div>

    <hr>

    <!-- Step 2：建立門店 -->
    <div id="step2-section" class="mb-4 section-locked">
      <h6><span class="step-badge" id="badge2">2</span>建立門店</h6>
      <div id="stores-list" class="mb-2">
        <p class="text-muted small mb-1">尚未建立任何門店</p>
      </div>
      <div class="input-group">
        <input type="text" id="store-name" class="form-control" placeholder="門店名稱（例：高雄總店）">
        <input type="text" id="store-code" class="form-control" placeholder="代號（例：KHH-01）">
        <button class="btn btn-outline-primary" onclick="addStore()">新增</button>
      </div>
    </div>

    <hr>

    <!-- Step 3：建立門店帳號 -->
    <div id="step3-section" class="mb-2 section-locked">
      <h6><span class="step-badge" id="badge3">3</span>建立門店帳號</h6>
      <p class="text-muted" style="font-size:0.85rem;">可重複建立多個門店帳號</p>
      <div class="mb-2">
        <input type="email" id="store-email" class="form-control mb-2" placeholder="門店帳號 Email">
        <input type="password" id="store-password" class="form-control mb-2" placeholder="密碼（至少 8 碼）">
        <input type="text" id="store-user-name" class="form-control mb-2" placeholder="負責人姓名">
        <select id="store-select" class="form-select">
          <option value="">請選擇門店</option>
        </select>
      </div>
      <button class="btn btn-outline-primary w-100" onclick="createStoreUser()">建立門店帳號</button>
      <div id="store-user-result" class="mt-2"></div>
    </div>

    <hr>
    <div class="text-center">
      <a href="login.html" class="btn btn-success">✅ 設定完成，前往登入</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script>
    let stores = [];
    let adminCredentials = { email: '', password: '' };

    async function createAdmin() {
      const email = document.getElementById('admin-email').value.trim();
      const password = document.getElementById('admin-password').value;
      const name = document.getElementById('admin-name').value.trim();
      const resultEl = document.getElementById('admin-result');

      if (!email || !password || !name) {
        resultEl.innerHTML = '<div class="alert alert-danger py-2">請填寫所有欄位</div>';
        return;
      }
      if (password.length < 8) {
        resultEl.innerHTML = '<div class="alert alert-danger py-2">密碼至少 8 碼</div>';
        return;
      }

      resultEl.innerHTML = '<div class="text-muted small">建立中...</div>';

      const { data, error } = await supabase.auth.signUp({
        email, password,
        options: { data: { full_name: name } }
      });

      if (error) {
        resultEl.innerHTML = `<div class="alert alert-danger py-2">${error.message}</div>`;
        return;
      }

      // 若 signUp 沒自動登入（Email 確認尚未關閉），嘗試手動登入
      if (!data.session) {
        const { error: signInError } = await supabase.auth.signInWithPassword({ email, password });
        if (signInError) {
          resultEl.innerHTML = `<div class="alert alert-warning py-2">
            帳號建立成功，但自動登入失敗。<br>
            請確認已在 Supabase Dashboard → Authentication → Providers → Email 關閉「Confirm email」，再重試。
          </div>`;
          return;
        }
      }

      // 建立或更新 profile 為 admin（trigger 已移除，改由前端處理）
      const { error: profileError } = await supabase.from('profiles')
        .upsert({ id: data.user.id, role: 'admin', full_name: name }, { onConflict: 'id' });

      if (profileError) {
        resultEl.innerHTML = `<div class="alert alert-warning py-2">
          帳號建立成功，但角色設定失敗：${profileError.message}
        </div>`;
        return;
      }

      adminCredentials = { email, password };
      resultEl.innerHTML = `<div class="alert alert-success py-2">✅ 管理員帳號建立成功！<br>Email：${email}<br>現在可以繼續建立門店。</div>`;

      document.getElementById('badge1').classList.add('done');
      document.getElementById('step2-section').classList.remove('section-locked');
    }

    async function addStore() {
      const name = document.getElementById('store-name').value.trim();
      const code = document.getElementById('store-code').value.trim();
      if (!name) { alert('請輸入門店名稱'); return; }

      const { data, error } = await supabase.from('stores')
        .insert({ name, code: code || null })
        .select()
        .single();

      if (error) { alert('新增失敗：' + error.message); return; }

      stores.push(data);
      renderStores();
      document.getElementById('store-name').value = '';
      document.getElementById('store-code').value = '';

      document.getElementById('badge2').classList.add('done');
      document.getElementById('step3-section').classList.remove('section-locked');
    }

    function renderStores() {
      const list = document.getElementById('stores-list');
      list.innerHTML = stores.length === 0
        ? '<p class="text-muted small mb-1">尚未建立任何門店</p>'
        : stores.map(s => `
            <span class="badge bg-light text-dark border me-1 mb-1" style="font-size:0.85rem;">
              ${s.name}${s.code ? ' ('+s.code+')' : ''}
            </span>`).join('');

      const sel = document.getElementById('store-select');
      sel.innerHTML = '<option value="">請選擇門店</option>' +
        stores.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
    }

    async function createStoreUser() {
      const email = document.getElementById('store-email').value.trim();
      const password = document.getElementById('store-password').value;
      const name = document.getElementById('store-user-name').value.trim();
      const storeId = document.getElementById('store-select').value;
      const resultEl = document.getElementById('store-user-result');

      if (!email || !password || !name || !storeId) {
        resultEl.innerHTML = '<div class="alert alert-danger py-2">請填寫所有欄位並選擇門店</div>';
        return;
      }

      resultEl.innerHTML = '<div class="text-muted small">建立中...</div>';

      // 建立門店帳號（signUp 後 session 會切換到新用戶）
      const { data, error } = await supabase.auth.signUp({
        email, password,
        options: { data: { full_name: name } }
      });

      if (error) {
        resultEl.innerHTML = `<div class="alert alert-danger py-2">${error.message}</div>`;
        return;
      }

      // 若沒自動登入，手動登入為門店用戶
      if (!data.session) {
        await supabase.auth.signInWithPassword({ email, password });
      }

      // 更新門店用戶的 profile
      // 建立或更新門店帳號 profile
      const { error: profileError } = await supabase.from('profiles')
        .upsert({ id: data.user.id, role: 'store_manager', full_name: name, store_id: storeId }, { onConflict: 'id' });

      // 切回管理員身份
      await supabase.auth.signInWithPassword({
        email: adminCredentials.email,
        password: adminCredentials.password
      });

      const storeName = stores.find(s => s.id === storeId)?.name || '';

      if (profileError) {
        resultEl.innerHTML = `<div class="alert alert-warning py-2">帳號建立成功，但門店關聯失敗：${profileError.message}</div>`;
      } else {
        resultEl.innerHTML = `<div class="alert alert-success py-2">
          ✅ 門店帳號建立成功！<br>Email：${email} / 門店：${storeName}
        </div>`;
        document.getElementById('badge3').classList.add('done');
      }

      document.getElementById('store-email').value = '';
      document.getElementById('store-password').value = '';
      document.getElementById('store-user-name').value = '';
    }
  </script>
</body>
</html>
